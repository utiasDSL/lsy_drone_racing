name: Evaluate and Update Leaderboard

on:
  workflow_dispatch:
    inputs:
      repository:
        description: 'The student repository (e.g., org/repo)'
        required: true
        type: string
      sha:
        description: 'The commit SHA to checkout'
        required: true
        type: string
      actor:
        description: 'The GitHub username of the student'
        required: true
        type: string

permissions:
  contents: write

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Competition Repo
        uses: actions/checkout@v4
        with:
          ref: competition

      - name: Checkout Student Code
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.sha }}
          path: student_code

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.3
        with:
          manifest-path: student_code/pyproject.toml
          pixi-version: v0.66.0
          cache: true
          cache-write: false
          activate-environment: false
          locked: true

      - name: Check Whitelist by Username
        run: |
          # Pass the GitHub username to the script
          pixi run --manifest-path student_code/pyproject.toml python scripts/check_whitelist.py "${{ inputs.actor }}"

      - name: Run Student Evaluation
        working-directory: student_code
        run: pixi run evaluate

      - name: Update Leaderboard TOML
        run: |
          pixi run --manifest-path student_code/pyproject.toml python scripts/update_leaderboard.py "${{ inputs.actor }}"

      - name: Generate README
        run: |
          pixi run --manifest-path student_code/pyproject.toml python scripts/update_readme.py

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🏆 Leaderboard update by ${{ inputs.actor }}"
          file_pattern: "scripts/leaderboard.toml README.md"