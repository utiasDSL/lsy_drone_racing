# AIGP Stage 0 (bootstrapping): single gate, very relaxed tolerances.
#
# This is intended as a smoke-test config to verify that PPO can learn to
# pass at least one gate using the crazyflow-backed simulator.

[controller]
file = "state_controller.py"

[sim]
physics = "first_principles"
drone_model = "cf21B_500"
camera_view = [5.0, 180.0, -25.0, 0.0, 0.0, 0.0]
freq = 500
attitude_freq = 500
render = false

[env]
id = "AIGPDroneRacing-v0"
seed = "random"
freq = 50
sensor_range = 100.0
control_mode = "attitude"

[env.track]
randomize = false
obstacles = []

[[env.track.gates]]
pos = [2.0, 0.0, 1.0]
rpy = [0.0, 0.0, 0.0]

[[env.track.drones]]
pos = [0.0, 0.0, 1.0]
rpy = [0.0, 0.0, 0.0]
vel = [0.0, 0.0, 0.0]
ang_vel = [0.0, 0.0, 0.0]

[env.track.safety_limits]
pos_limit_low = [-2.0, -5.0, 0.0]
pos_limit_high = [12.0, 5.0, 4.0]

[env.track.gate_size]
width = 2.0
height = 2.0
tolerance = 1.5

