# AIGP compressed 10-stage curriculum (2026 plan).
#
# This file is consumed by `lsy_drone_racing.aigp.curriculum`.

[curriculum]
name = "aigp_10stage_tuned_v1"
max_gates = 11

# Advancement stability gate: stddev of recent completion fractions must be below this threshold.
stability_window = 20
stability_threshold = 0.15

# Evaluation defaults (can be overridden per-stage)
eval_episodes = 30

# Panic mode: anti-deadlock controller that reduces DR then increases "assist" (geometry easing).
[curriculum.panic]
enable = true
target_success = 0.25
recover_success = 0.35
patience_evals = 5
step = 0.02
dr_min_mult = 0.30
assist_max_mult = 1.40
hardlock_zero_evals = 8
stuck_action = "rollback_stage"

# Adaptive difficulty (optional, finer-grained than panic mode).
[curriculum.adaptive]
enable = true
target_success = 0.25
tolerance = 0.05
step = 0.02
min_mult = 0.30
max_mult = 1.0
eval_window = 8
patience = 5

# Hard-lock recovery: temporarily ease gate geometry when stuck near 0% SR at min mult.
[curriculum.recovery]
enable = true
patience = 5
min_sr = 0.05
exit_sr = 0.20
tolerance_mult = 1.2
gate_scale = 1.1
require_min_mult = true

# ---- Stages ----
# Stage gate sizes are specified in meters (width/height) plus a tolerance margin.

[[curriculum.stages]]
name = "stage0_single_gate"
description = "1 gate, very large, swift reward"
tracks = ["aigp_stage0_single_gate.toml"]
track_weights = [1.0]
active_gate_count = 1
gate_width = 2.0
gate_height = 2.0
gate_tolerance = 1.5
reward_preset = "swift"
dr_tier = "none"
success_rate_threshold = 0.70
min_episodes = 200
max_episode_steps = 800

[[curriculum.stages]]
name = "stage1_two_gates"
description = "2 gates, large, tuned bridge (no DR, lookahead reward)"
